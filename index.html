<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>春节倒计时</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Microsoft YaHei', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(135deg, #d4af37 0%, #c8102e 50%, #8b0000 100%);
    color: white;
    position: relative;
    overflow: hidden;
  }

  #particles-js,
  #fireworks-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  #fireworks-canvas {
    z-index: 0;
    display: none;
  }

  .container {
    text-align: center;
    background: rgba(255, 255, 255, 0.95);
    padding: 50px 30px;
    border-radius: 24px;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
    z-index: 2;
    max-width: 90%;
    width: 600px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.3);
  }

  h1 {
    font-size: 3em;
    margin-bottom: 15px;
    color: #c8102e;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
  }

  .year-info {
    font-size: 1.3em;
    color: #8b0000;
    margin-bottom: 25px;
  }

  .spring-festival-date {
    font-size: 1.5em;
    color: #d4af37;
    margin-bottom: 30px;
    font-weight: bold;
    background: rgba(212, 175, 55, 0.1);
    padding: 10px 20px;
    border-radius: 12px;
    display: inline-block;
  }

  #countdown {
    font-size: 2.2em;
    color: #c8102e;
    margin: 20px 0;
    font-weight: bold;
    letter-spacing: 2px;
  }

  #currentDateTime {
    font-size: 1.1em;
    color: #666;
    margin-top: 20px;
    padding-top: 15px;
    border-top: 1px dashed #ddd;
  }

  /* 烟花预览按钮样式 */
  #fireworkBtn {
    margin-top: 20px;
    padding: 12px 30px;
    font-size: 1.1em;
    font-weight: bold;
    color: white;
    background: linear-gradient(90deg, #c8102e, #d4af37);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(200, 16, 46, 0.3);
    transition: all 0.3s ease;
  }

  #fireworkBtn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(200, 16, 46, 0.5);
  }

  #fireworkBtn:active {
    transform: translateY(0);
  }

  /* 按钮禁用样式 */
  #fireworkBtn:disabled {
    background: #ccc;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  @media (max-width: 768px) {
    h1 { font-size: 2.2em; }
    .spring-festival-date { font-size: 1.2em; }
    #countdown { font-size: 1.8em; }
    .container { padding: 30px 20px; }
    #fireworkBtn { padding: 10px 25px; font-size: 1em; }
  }

  @media (max-width: 480px) {
    h1 { font-size: 1.8em; }
    #countdown { font-size: 1.5em; line-height: 1.4; }
  }
</style>
</head>

<body>

  <h1 id="yearTitle">春节倒计时</h1>
  <p class="year-info" id="yearInfo"></p>
  <div class="spring-festival-date" id="festivalDate"></div>
  <div id="countdown"></div>

  <!-- 新增烟花预览按钮 -->
  <button id="fireworkBtn">🎆 预览烟花效果</button>
</div>

<div id="particles-js"></div>
<canvas id="fireworks-canvas"></canvas>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

  2099: { date: '2099-02-17', zodiac: '羊', ganzhi: '己未' },
  2100: { date: '2100-02-06', zodiac: '猴', ganzhi: '庚申' }
};

// ==============================================
// 2. 自动判断当前应该显示哪一年的春节
// ==============================================
const now = new Date();
const currentYear = now.getFullYear();

let targetYear;
let festivalDateStr;
let festivalMs;

// 从当前年份往前找，找到第一个还没过的春节
for (let y = currentYear; y <= 2100; y++) {
  const d = new Date(springFestivalData[y].date + 'T00:00:00');
  if (now < d) {
    targetYear = y;
    festivalDateStr = springFestivalData[y].date;
    festivalMs = d.getTime();
    break;
  }
}

// 如果当年所有春节都过了，默认取下一年
if (!targetYear) {
  targetYear = currentYear + 1;
  festivalDateStr = springFestivalData[targetYear]?.date || '2100-02-06';
  festivalMs = new Date(festivalDateStr + 'T00:00:00').getTime();
}

const { zodiac, ganzhi } = springFestivalData[targetYear];

// ==============================================
// 3. 页面文字自动填充
// ==============================================
document.getElementById('yearTitle').textContent = `${targetYear}年春节倒计时`;
document.getElementById('yearInfo').textContent = `${ganzhi}${zodiac}年 · 新春大吉`;

const t = new Date(festivalDateStr);
const week = '日一二三四五六'[t.getDay()];
document.getElementById('festivalDate').textContent =
  `${targetYear}年${t.getMonth()+1}月${t.getDate()}日 星期${week} 农历正月初一`;

// ==============================================
// 4. 倒计时
// ==============================================
function updateCountdown() {
  const nowTime = new Date().getTime();
  const diff = festivalMs - nowTime;

  if (diff < 0) {
    document.getElementById('countdown').innerText = '🎉 新春快乐！';
    return;
  }

  const s = 1000, m = s*60, h = m*60, d = h*24;
  const days = Math.floor(diff / d);
  const hours = Math.floor((diff % d) / h);
  const mins = Math.floor((diff % h) / m);
  const secs = Math.floor((diff % m) / s);

  document.getElementById('countdown').innerText =
    `${days}天 ${hours}小时 ${mins}分钟 ${secs}秒`;
}

// ==============================================
// 5. 当前时间
// ==============================================
function updateCurrentDateTime() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  const y = d.getFullYear();
  const mon = pad(d.getMonth()+1);
  const day = pad(d.getDate());
  const w = '日一二三四五六'[d.getDay()];
  const hh = pad(d.getHours());
  const mm = pad(d.getMinutes());
  const ss = pad(d.getSeconds());
  document.getElementById('currentDateTime').innerText =
    `当前时间：${y}年${mon}月${day}日 星期${w} ${hh}:${mm}:${ss}`;
}

// ==============================================
// 6. 自动判断：正月初一 ~ 初七 → 播放烟花
// ==============================================
function isSpringFestivalWeek() {
  const today = new Date();
  const ny = today.getFullYear();
  if (!springFestivalData[ny]) return false;
  const firstDay = new Date(springFestivalData[ny].date);
  const seventhDay = new Date(firstDay);
  seventhDay.setDate(firstDay.getDate() + 6);
  return today >= firstDay && today <= seventhDay;
}

// ==============================================
// 7. 烟花动画核心逻辑（新增控制变量）
// ==============================================
const fwCanvas = document.getElementById('fireworks-canvas');
const fwCtx = fwCanvas.getContext('2d');
let fwWidth = window.innerWidth;
let fwHeight = window.innerHeight;
fwCanvas.width = fwWidth;
fwCanvas.height = fwHeight;

let particles = [];
let fireworkInterval = null; // 烟花定时器
let isFireworkPlaying = false; // 烟花播放状态

// 监听窗口大小变化，适配烟花画布尺寸
window.addEventListener('resize', () => {
  fwWidth = window.innerWidth;
  fwHeight = window.innerHeight;
  fwCanvas.width = fwWidth;
  fwCanvas.height = fwHeight;
});

class FireworkParticle {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.speed = Math.random() * 4 + 2;
    this.angle = Math.random() * Math.PI * 2;
    this.gravity = 0.05;
    this.vx = Math.cos(this.angle) * this.speed;
    this.vy = Math.sin(this.angle) * this.speed;
    this.alpha = 1;
    this.decay = Math.random() * 0.02 + 0.005;
    this.color = `hsl(${Math.random() * 360},100%,50%)`;
  }
  update() {
    this.vy += this.gravity;
    this.x += this.vx;
    this.y += this.vy;
    this.alpha -= this.decay;
  }
  draw() {
    fwCtx.save();
    fwCtx.globalAlpha = this.alpha;
    fwCtx.beginPath();
    fwCtx.arc(this.x, this.y, 2, 0, Math.PI * 2);
    fwCtx.fillStyle = this.color;
    fwCtx.fill();
    fwCtx.restore();
  }
}

function createFirework() {
  const x = Math.random() * fwWidth;
  const y = Math.random() * fwHeight * 0.7;
  for (let i = 0; i < 100; i++) {
    particles.push(new FireworkParticle(x, y));
  }
}

function animateFireworks() {
  if (!isFireworkPlaying) return; // 停止播放时退出动画循环
  fwCtx.fillStyle = 'rgba(0,0,0,0.2)';
  fwCtx.fillRect(0, 0, fwWidth, fwHeight);
  particles = particles.filter(p => p.alpha > 0);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateFireworks);
}

// 启动烟花（重构为可复用函数）
function startFireworks() {
  if (isFireworkPlaying) return; // 防止重复启动
  isFireworkPlaying = true;
  fwCanvas.style.display = 'block';
  animateFireworks();
  fireworkInterval = setInterval(createFirework, 800);
  
  // 更新按钮状态
  const fireworkBtn = document.getElementById('fireworkBtn');
  fireworkBtn.textContent = '🎇 关闭烟花效果';
  fireworkBtn.disabled = false;
}

// 停止烟花
function stopFireworks() {
  if (!isFireworkPlaying) return;
  isFireworkPlaying = false;
  clearInterval(fireworkInterval);
  fwCanvas.style.display = 'none';
  particles = []; // 清空粒子
  
  // 更新按钮状态
  const fireworkBtn = document.getElementById('fireworkBtn');
  fireworkBtn.textContent = '🎆 预览烟花效果';
}

// ==============================================
// 8. 烟花按钮点击事件
// ==============================================
document.getElementById('fireworkBtn').addEventListener('click', function() {
  if (isFireworkPlaying) {
    stopFireworks();
  } else {
    startFireworks();
  }
});

// ==============================================
// 9. 初始化逻辑
// ==============================================
updateCountdown();
updateCurrentDateTime();
setInterval(updateCountdown, 1000);
setInterval(updateCurrentDateTime, 1000);

// 过年期间自动放烟花（并禁用按钮）
if (isSpringFestivalWeek()) {
  startFireworks();
  const fireworkBtn = document.getElementById('fireworkBtn');
  fireworkBtn.textContent = '🎇 春节期间自动播放烟花';
  fireworkBtn.disabled = true;
}

// 粒子背景
particlesJS('particles-js',{
  particles:{
    number:{value:100,density:{enable:true,value_area:800}},
    color:{value:["#ffd700","#c8102e","#fff","#ff8c00"]},
    shape:{type:["circle","star"],stroke:{width:1,color:"#fff"}},
    opacity:{value:0.7,random:true,anim:{enable:true,speed:0.5,opacity_min:0.2}},
    size:{value:5,random:true,anim:{enable:true,speed:8,size_min:0.5}},
    line_linked:{enable:true,distance:150,color:"#fff",opacity:0.2,width:1},
    move:{enable:true,speed:3,random:true,out_mode:"out",bounce:true}
  },
  interactivity:{
    events:{onhover:{enable:true,mode:"grab"},onclick:{enable:true,mode:"push"}},
    modes:{grab:{distance:180,line_linked:{opacity:0.8}},push:{particles_nb:5}}
  },
  retina_detect:true
});
</script>
</body>
</html>
